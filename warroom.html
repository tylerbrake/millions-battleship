<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Millions – Battleship</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=IM+Fell+English&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090e;--panel:#10131a;--border:#252830;
  --gold:#c9a227;--gold-dim:#7a621a;--text:#c8c2b0;--text-dim:#a39d90;
  --teamA:#22c55e;--teamB:#e0517a;--hit:rgba(210,35,35,0.9);--miss:rgba(25,70,180,0.84);
  --cell:36px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IM Fell English',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 10px 48px;overflow-x:hidden;}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
header,.gate-wrap,main{position:relative;z-index:1;}
header{text-align:center;padding:28px 0 8px;}
header h1{font-family:'Cinzel',serif;font-size:clamp(1.6rem,4vw,2.3rem);font-weight:900;letter-spacing:.13em;color:var(--gold);text-shadow:0 0 30px #c9a22766,0 0 70px #c9a22733,0 2px 0 #000;}
header p{font-size:.9rem;color:var(--text-dim);margin-top:5px;letter-spacing:.08em;}
.conn-status{position:fixed;top:8px;right:10px;font-size:.7rem;color:var(--text-dim);z-index:50;}
.conn-status.ok{color:#4ade80;}
.conn-status.err{color:#d06060;}

.gate-wrap{max-width:340px;margin:40px auto;background:var(--panel);border:1px solid var(--gold-dim);border-radius:8px;padding:30px 32px;text-align:center;}
.gate-wrap h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1.1rem;margin-bottom:8px;}
.gate-wrap p{font-size:.85rem;color:var(--text-dim);margin-bottom:16px;}
.gate-wrap input{width:100%;background:#0b0e15;border:1px solid var(--border);border-radius:4px;padding:9px 12px;color:var(--text);font-family:'IM Fell English',serif;margin-bottom:10px;outline:none;}
.gate-wrap input:focus{border-color:var(--gold-dim);}
.gate-wrap button{width:100%;font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.08em;padding:9px;border-radius:4px;border:1px solid var(--gold-dim);background:#1a1608;color:var(--gold);cursor:pointer;}
.gate-wrap button:hover{box-shadow:0 0 14px #c9a22744;}
.gate-error{color:#d06060;font-size:.8rem;margin-top:8px;min-height:14px;}

main{display:none;width:100%;}

.controls-panel{max-width:680px;margin:0 auto 24px;background:var(--panel);border:1px solid var(--gold-dim);border-radius:8px;padding:18px;text-align:center;}
.controls-panel h3{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.1em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:12px;}
.controls-panel button{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.06em;padding:8px 16px;border-radius:4px;border:1px solid var(--gold-dim);background:#1a1608;color:var(--gold);cursor:pointer;margin:4px;}
.controls-panel button.reset-link{font-size:.78rem;border-color:var(--border);background:none;color:var(--text-dim);}
.controls-panel button.reset-link:hover{color:#d06060;border-color:#6a1515;}
.controls-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:14px 0;}
.pw-row{display:flex;gap:8px;max-width:380px;margin:6px auto 0;}
.pw-row input{flex:1;background:#0b0e15;border:1px solid var(--border);border-radius:4px;padding:8px 10px;color:var(--text);font-family:'IM Fell English',serif;outline:none;}
.pw-msg{font-size:.8rem;color:var(--gold);min-height:16px;margin-top:6px;}
.legend-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:12px;font-size:.78rem;color:var(--text-dim);}
.legend-item{display:flex;align-items:center;gap:4px;}
.legend-swatch{width:11px;height:11px;border-radius:2px;}

.bounty-section{width:100%;max-width:760px;margin:0 auto 22px;text-align:center;}
.bounty-label{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.18em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:8px;}
.bounty-row{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;}
.bounty-tile{width:42px;height:42px;border-radius:4px;border:2px solid var(--gold-dim);background:#0d1017;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold-dim);}
.bounty-tile.revealed{border-color:var(--gold);box-shadow:0 0 14px #c9a22766;color:var(--gold);}

.teams-wrap{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin-top:6px;}
.team-board{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;}
.team-board h2{font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:.1em;text-align:center;margin-bottom:10px;}
.team-board.a h2{color:var(--teamA);}
.team-board.b h2{color:var(--teamB);}
.stat-line{font-size:.88rem;color:var(--text-dim);text-align:center;margin-bottom:10px;}
.stat-line strong{color:var(--gold);}

.fleet-status{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px;}
.fleet-status-chip{display:flex;align-items:center;gap:5px;font-size:.7rem;padding:4px 9px;border-radius:4px;border:1px solid var(--border);background:#0b0e15;color:var(--text-dim);}
.fleet-status-chip.all-sunk{border-color:#7c1010;background:#1a0808;color:#f87171;}
.fleet-status-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.fleet-status-chip.all-sunk .fleet-status-swatch{opacity:.5;}
.col-headers,.grid{display:grid;grid-template-columns:20px repeat(16,var(--cell));gap:2px;}
.col-headers{margin-bottom:2px;}
.col-header,.row-header{font-family:'Cinzel',serif;font-size:.7rem;font-weight:700;color:var(--gold-dim);display:flex;align-items:center;justify-content:center;}
.cell{width:var(--cell);height:var(--cell);position:relative;border-radius:3px;border:2px solid #252830;background:#0b0e15;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.cell img{width:27px;height:27px;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 1px 3px rgba(0,0,0,1));}
.cell.ship-revealed{box-shadow:0 0 8px currentColor;}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;opacity:0;border-radius:1px;}
.cell[data-shot="hit"] .overlay{background:var(--hit);opacity:1;}
.cell[data-shot="miss"] .overlay{background:var(--miss);opacity:1;}
.cell[data-shot="hit"] .overlay::after{content:"💥";}
.cell[data-shot="miss"] .overlay::after{content:"💨";}
.tooltip{position:fixed;background:#12141c;border:1px solid var(--gold-dim);border-radius:4px;padding:6px 12px;font-size:.9rem;color:var(--text);pointer-events:none;opacity:0;transition:opacity .1s;z-index:999;max-width:260px;line-height:1.5;}

.admin-logs{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:24px;max-width:680px;margin-left:auto;margin-right:auto;}
.admin-log-col{flex:1;min-width:220px;max-width:300px;}
.admin-log-col h4{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.08em;text-align:center;margin-bottom:8px;}
.admin-log-col.a h4{color:var(--teamA);}
.admin-log-col.b h4{color:var(--teamB);}
.admin-log-list{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;background:#0b0e15;border:1px solid var(--border);border-radius:6px;padding:8px;}
.admin-log-entry{font-size:.78rem;padding:6px 8px;border-radius:3px;display:flex;justify-content:space-between;gap:8px;color:var(--text-dim);}
.admin-log-entry.hit{color:#e8716b;}
.admin-log-entry.miss{color:#6fa8e0;}
.admin-log-entry.undo{color:var(--text-dim);font-style:italic;}
.admin-log-time{font-size:.66rem;color:var(--text-dim);flex-shrink:0;white-space:nowrap;}
.admin-log-empty{font-size:.78rem;color:var(--text-dim);text-align:center;padding:10px 0;}
</style>
</head>

<script>
(function(){
  const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
  let W,H,P=[];const N=110;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();
  function rnd(a,b){return a+Math.random()*(b-a);}
  function mp(fe){
    let x;if(fe||Math.random()<0.65){const ew=W*0.18;x=Math.random()<0.5?rnd(2,ew):rnd(W-ew,W-2);}else x=rnd(0,W);
    const sz=Math.random()<0.15?rnd(2.5,4.5):rnd(0.8,2.2);
    return{x,y:rnd(-20,H+20),size:sz,sy:-rnd(0.15,0.65),sx:rnd(-0.12,0.12),a:rnd(0.1,0.5),ad:Math.random()<0.5?1:-1,as:rnd(0.002,0.008),h:rnd(34,54),gr:sz*rnd(2.5,4.5)};
  }
  for(let i=0;i<N;i++)P.push(mp(i<N*0.65));
  function draw(){
    ctx.clearRect(0,0,W,H);
    P.forEach(p=>{
      p.y+=p.sy;p.x+=p.sx;p.a+=p.ad*p.as;if(p.a>0.55||p.a<0.04)p.ad*=-1;
      if(p.y<-30||p.x<-20||p.x>W+20){Object.assign(p,mp(Math.random()<0.65));p.y=H+10;}
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.gr);
      g.addColorStop(0,`hsla(${p.h},88%,65%,${p.a})`);g.addColorStop(0.4,`hsla(${p.h},80%,52%,${p.a*0.45})`);g.addColorStop(1,`hsla(${p.h},70%,40%,0)`);
      ctx.beginPath();ctx.arc(p.x,p.y,p.gr,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    });requestAnimationFrame(draw);
  }draw();
})();

async function sha256(text){
  const enc=new TextEncoder().encode(text);
  const buf=await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function quadrantOf(r,c){return(r<8?0:2)+(c<8?0:1);}
const FLAT = LAYOUT.flat();
const TILE_ITEMS = FLAT.map((key,i)=>{
  const r=Math.floor(i/16),c=i%16,q=quadrantOf(r,c);
  return key==='sk'?SK_BY_Q[q]:key==='hk'?HK_BY_Q[q]:DEF[key];
});

const SHIP_COLORS = {
  'Battleship':'#e0395a','Cruiser':'#a855f7','Destroyer':'#3b6fd6','Patrol Boat':'#38bdf8',
  'L-Shape':'#4ade80','T-Shape':'#facc15','Plus':'#fb923c'
};
const SHIP_TOTALS = {'Battleship':2,'Cruiser':4,'Destroyer':4,'Patrol Boat':3,'L-Shape':2,'T-Shape':2,'Plus':1};
const SHIP_ORDER = ['Battleship','Cruiser','Destroyer','Patrol Boat','L-Shape','T-Shape','Plus'];

function renderFleetStatus(prefix, shipInstances){
  const el=document.getElementById(prefix+'-fleet-status');
  if(!el) return;
  const sunkCounts = {};
  Object.values(shipInstances || {}).forEach(inst=>{
    if(inst.sunk){ sunkCounts[inst.name] = (sunkCounts[inst.name]||0) + 1; }
  });
  el.innerHTML='';
  SHIP_ORDER.forEach(name=>{
    const sunk = sunkCounts[name] || 0;
    const total = SHIP_TOTALS[name];
    const chip=document.createElement('div');
    chip.className='fleet-status-chip'+(sunk===total ? ' all-sunk' : '');
    chip.innerHTML=`<div class="fleet-status-swatch" style="background:${SHIP_COLORS[name]}"></div>${name} ${sunk}/${total}${sunk===total?' ☠':''}`;
    el.appendChild(chip);
  });
}

let TEAM_A_SHIPS={}, TEAM_B_SHIPS={}, TEAM_A_SHOTS={}, TEAM_B_SHOTS={};
let bountyRevealCount = 0;
let ADMIN_PASSWORD_HASH = null;
let isAuthenticated = false;

async function initAdminHash(){
  const snap = await db.ref('battleship/admin/passwordHash').once('value');
  if(snap.exists()){ ADMIN_PASSWORD_HASH = snap.val(); }
  else { ADMIN_PASSWORD_HASH = await sha256('millionsadmin'); await db.ref('battleship/admin/passwordHash').set(ADMIN_PASSWORD_HASH); }
}

async function checkAccess(){
  const val=document.getElementById('gate-input').value;
  const hash=await sha256(val);
  if(hash===ADMIN_PASSWORD_HASH){
    isAuthenticated = true;
    document.getElementById('gate-wrap').style.display='none';
    document.getElementById('main-content').style.display='block';
    startDataLoad();
  } else {
    document.getElementById('gate-error').textContent='Incorrect password.';
  }
}
document.getElementById('gate-input').addEventListener('keydown', e=>{ if(e.key==='Enter') checkAccess(); });

function buildBountyRow(){
  const row=document.getElementById('bounty-row');
  row.innerHTML='';
  for(let i=0;i<12;i++){
    const revealed = i < bountyRevealCount;
    const tile=document.createElement('div');
    tile.className='bounty-tile'+(revealed?' revealed':'');
    tile.textContent=revealed?'★':'?';
    row.appendChild(tile);
  }
}
async function revealNextBounty(){
  if(!isAuthenticated) return;
  if(bountyRevealCount>=12) return;
  await db.ref('battleship/bounty/revealCount').set(bountyRevealCount+1);
}
async function resetBounties(){
  if(!isAuthenticated) return;
  await db.ref('battleship/bounty/revealCount').set(0);
}

function buildLegend(){
  const el=document.getElementById('fleet-legend');
  el.innerHTML='';
  Object.entries(SHIP_COLORS).forEach(([name,color])=>{
    el.innerHTML+=`<div class="legend-item"><div class="legend-swatch" style="background:${color}"></div>${name}</div>`;
  });
}

function buildTeamGrid(prefix, shots, ships){
  const colH=document.getElementById(prefix+'-col-headers'), grid=document.getElementById(prefix+'-grid');
  colH.innerHTML='<div></div>';COLS.forEach(c=>colH.innerHTML+=`<div class="col-header">${c}</div>`);
  grid.innerHTML='';
  let hits=0, misses=0;
  for(let r=0;r<ROWS;r++){
    const rh=document.createElement('div');rh.className='row-header';rh.textContent=r+1;grid.appendChild(rh);
    for(let c=0;c<16;c++){
      const idx=r*16+c;
      const cell=document.createElement('div');
      cell.className='cell';
      cell.dataset.coord=`${COLS[c]}${r+1}`;
      if(ships[idx]){
        const col=SHIP_COLORS[ships[idx]];
        cell.classList.add('ship-revealed');
        cell.style.borderColor=col;cell.style.color=col;cell.style.background=col+'22';
      }
      const img=document.createElement('img');img.src=BASE+TILE_ITEMS[idx][0];img.onerror=function(){this.style.display='none';};cell.appendChild(img);
      if(shots[idx]){cell.dataset.shot=shots[idx]; shots[idx]==='hit'?hits++:misses++;}
      const ov=document.createElement('div');ov.className='overlay';cell.appendChild(ov);
      cell.addEventListener('mouseenter',e=>showTip(e,`${cell.dataset.coord} · ${TILE_ITEMS[idx][1]}${ships[idx]?' · '+ships[idx]:''}`));
      cell.addEventListener('mouseleave',hideTip);
      grid.appendChild(cell);
    }
  }
  document.getElementById(prefix+'-hits').textContent=hits;
  document.getElementById(prefix+'-misses').textContent=misses;
}

const tooltip=document.getElementById('tooltip');
function showTip(e,text){tooltip.textContent=text;tooltip.style.opacity='1';moveTip(e);}
function hideTip(){tooltip.style.opacity='0';}
document.addEventListener('mousemove',moveTip);
function moveTip(e){tooltip.style.left=(e.clientX+14)+'px';tooltip.style.top=(e.clientY+14)+'px';}

function renderAll(){
  buildBountyRow();
  buildTeamGrid('a', TEAM_A_SHOTS, TEAM_A_SHIPS);
  buildTeamGrid('b', TEAM_B_SHOTS, TEAM_B_SHIPS);
}

function listenTeam(prefix, path){
  db.ref(path+'/name').on('value', snap=>{
    const name = snap.val() || (prefix==='a'?'Team A':'Team B');
    document.getElementById('team-'+prefix+'-header').textContent = '⚓ ' + name;
  });
  db.ref(path+'/ships').on('value', snap=>{
    const data = snap.val() || {};
    if(prefix==='a') TEAM_A_SHIPS = data; else TEAM_B_SHIPS = data;
    renderAll();
  });
  db.ref(path+'/shotsReceived').on('value', snap=>{
    const data = snap.val() || {};
    if(prefix==='a') TEAM_A_SHOTS = data; else TEAM_B_SHOTS = data;
    renderAll();
  });
  db.ref(path+'/shipInstances').on('value', snap=>{
    renderFleetStatus(prefix, snap.val() || {});
  });
}

async function changeAdminPassword(){
  if(!isAuthenticated) return;
  const val = document.getElementById('new-admin-pw').value;
  if(!val){ document.getElementById('admin-pw-msg').textContent='Please enter a new password.'; return; }
  ADMIN_PASSWORD_HASH = await sha256(val);
  await db.ref('battleship/admin/passwordHash').set(ADMIN_PASSWORD_HASH);
  document.getElementById('new-admin-pw').value = '';
  const msg = document.getElementById('admin-pw-msg');
  msg.textContent = 'Password updated and saved.';
  setTimeout(()=>{ if(msg.textContent==='Password updated and saved.') msg.textContent=''; }, 4000);
}

async function resetEnemyWaters(){
  if(!isAuthenticated) return;
  if(!confirm('This clears all fired shots and the audit log for both teams. This cannot be undone. Continue?')) return;
  await db.ref('battleship/teams/teamA/shotsReceived').remove();
  await db.ref('battleship/teams/teamB/shotsReceived').remove();
  await db.ref('battleship/teams/teamA/log').remove();
  await db.ref('battleship/teams/teamB/log').remove();
}

async function toggleFleetLock(){
  if(!isAuthenticated) return;
  const snap = await db.ref('battleship/phase/fleetLocked').once('value');
  const current = snap.val() || false;
  await db.ref('battleship/phase/fleetLocked').set(!current);
}
db.ref('battleship/phase/fleetLocked').on('value', snap=>{
  const locked = snap.val() || false;
  const btn=document.getElementById('fleet-lock-btn');
  if(btn) btn.textContent = locked ? 'Unlock My Fleet Pages' : 'Lock My Fleet Pages';
});

db.ref('battleship/bounty/revealCount').on('value', snap=>{
  bountyRevealCount = snap.val() || 0;
  buildBountyRow();
  const btn=document.getElementById('reveal-next-btn');
  if(!btn) return;
  if(bountyRevealCount>=12){btn.textContent='All Bounties Revealed';btn.disabled=true;}
  else{btn.textContent=`Reveal Next Bounty (${bountyRevealCount}/12)`;btn.disabled=false;}
});

let adminLogA = [], adminLogB = [];
function listenAdminLogs(){
  db.ref('battleship/teams/teamA/log').on('child_added', snap=>{ adminLogA.push(snap.val()); renderAdminLog('a', adminLogA); });
  db.ref('battleship/teams/teamA/log').on('child_removed', ()=>{ adminLogA = []; renderAdminLog('a', adminLogA); });
  db.ref('battleship/teams/teamB/log').on('child_added', snap=>{ adminLogB.push(snap.val()); renderAdminLog('b', adminLogB); });
  db.ref('battleship/teams/teamB/log').on('child_removed', ()=>{ adminLogB = []; renderAdminLog('b', adminLogB); });
}
function renderAdminLog(prefix, entries){
  const list=document.getElementById('admin-log-'+prefix);
  if(!list) return;
  if(entries.length===0){ list.innerHTML='<div class="admin-log-empty">No shots fired yet.</div>'; return; }
  list.innerHTML='';
  entries.slice().reverse().forEach(e=>{
    const div=document.createElement('div');
    const timeStr=new Date(e.time).toLocaleTimeString([], {hour:'numeric',minute:'2-digit',second:'2-digit'});
    if(e.type==='undo'){
      div.className='admin-log-entry undo';
      div.innerHTML=`<span>↩ Undid shot at ${e.coord}</span><span class="admin-log-time">${timeStr}</span>`;
    } else {
      div.className='admin-log-entry '+e.result;
      const icon=e.result==='hit'?'💥':'💨';
      div.innerHTML=`<span>${icon} ${e.coord} — ${e.result.toUpperCase()}</span><span class="admin-log-time">${timeStr}</span>`;
    }
    list.appendChild(div);
  });
}

// Ship/log data is only fetched after a successful password check — never beforehand.
function startDataLoad(){
  buildLegend();
  listenTeam('a', 'battleship/teams/teamA');
  listenTeam('b', 'battleship/teams/teamB');
  listenAdminLogs();
}

initAdminHash();
</script>
